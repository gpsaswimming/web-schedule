<!--
  GPSA Meet Schedule — CONSOLIDATED single-iframe embed (CUTOVER TARGET)

  This replaces the old header + Red/White/Blue + Invitationals iframes (5 frames)
  with ONE tabbed schedule.html. The Rosters (divisions.html) iframe and the separate
  Teams quick-access embed (snippets/teams-snippet.html) are unchanged.

  DO NOT paste this into SwimTopia until you are ready to cut over. While both this and
  the current multi-iframe embed (swimtopia-embed.html) work against the deployed site,
  only one should be live on the SwimTopia page. See README "Consolidated schedule".
-->

<!-- iframe-resizer (load once) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/iframe-resizer/4.3.9/iframeResizer.min.js"></script>

<!-- ROSTERS / DIVISIONS -->
<div id="top"></div>
<iframe
    src="https://meet-schedule.gpsaswimming.org/divisions.html"
    style="width: 100%; border: none; overflow: hidden;"
    scrolling="no"
    id="gpsa-divisions">
</iframe>

<!-- MEET SCHEDULE (tabbed: All Divisions / Red / White / Blue / Invitationals) -->
<div id="schedule"></div>
<iframe
    src="https://meet-schedule.gpsaswimming.org/schedule.html"
    style="width: 100%; border: none; overflow: hidden;"
    scrolling="no"
    id="gpsa-schedule">
</iframe>

<!-- Initialize all iframes -->
<script>
iFrameResize({
    log: false,
    checkOrigin: false,
    heightCalculationMethod: 'lowestElement',
    resizeFrom: 'child'
}, 'iframe[id^="gpsa-"]');
</script>
