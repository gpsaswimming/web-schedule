<!--
  GPSA Meet Schedule — SwimTopia embed (source of truth; paste into the SwimTopia
  Meet Schedule page editor). One tabbed schedule.html (All / Red / White / Blue /
  Invitationals) plus the Rosters grid. The Teams quick-access list is embedded
  separately via snippets/teams-snippet.html.
-->

<!-- iframe-resizer (load once) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/iframe-resizer/4.3.9/iframeResizer.min.js"></script>

<!-- ROSTERS / DIVISIONS -->
<div id="top"></div>
<iframe
    src="https://meet-schedule.gpsaswimming.org/divisions.html"
    style="width: 100%; border: none; overflow: hidden;"
    scrolling="no"
    id="gpsa-divisions">
</iframe>

<!-- MEET SCHEDULE (tabbed: All Divisions / Red / White / Blue / Invitationals) -->
<div id="schedule"></div>
<iframe
    src="https://meet-schedule.gpsaswimming.org/schedule.html"
    style="width: 100%; border: none; overflow: hidden;"
    scrolling="no"
    id="gpsa-schedule">
</iframe>

<!-- Initialize all iframes -->
<script>
iFrameResize({
    log: false,
    checkOrigin: false,
    heightCalculationMethod: 'lowestElement',
    resizeFrom: 'child'
}, 'iframe[id^="gpsa-"]');
</script>
